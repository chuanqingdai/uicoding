<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" role="img" aria-labelledby="bl-sys-title bl-sys-desc">
  <title id="bl-sys-title">What makes blacklight work, in one frame</title>
  <desc id="bl-sys-desc">A Curator session (Opus 4.7, 1M context) reasons over mounted Skills, reference Files, the bl-case memory store, and evidence JSONL bundles, helped by Sonnet 4.6 for summaries and Haiku 4.5 for false-positive adjudication. It emits typed step JSON. The Runner re-asserts verb class, classifies each step into one of five tiers (read-only, reversible-low, reversible-high, destructive, unknown), and applies it to a substrate primitive only after a backup is written; every applied action dual-writes to the case state and a local audit ledger; clean operations quarantine rather than unlink.</desc>

